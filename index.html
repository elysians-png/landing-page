<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sculpt – 404</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="page__shadow"></div>

      <header class="page__header">
        <div class="logo">
          <div class="logo__star">
            <svg
              class="logo__star-icon"
              width="42"
              height="42"
              viewBox="0 0 42 42"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M21 3l4.6 9.3 10.3 1.5-7.4 7.2 1.7 10.3L21 26.3 11.8 31.3 13.5 21 6.1 13.8l10.3-1.5L21 3z"
                fill="white"
              />
            </svg>
          </div>
          <span class="logo__text">Sculpt</span>
        </div>

        <a href="#" class="btn btn--secondary">Log In</a>
      </header>

      <section class="hero">
        <div class="hero__images">
          <img
            src="image.png"
            alt=""
            class="hero__image hero__image--bg"
          />
          <img
            src="monster.png"
            alt=""
            class="hero__image hero__image--front"
          />
          <div class="hero__ellipse"></div>
        </div>

        <div class="hero__content">
          <div class="hero__code">404</div>
          <h1 class="hero__title">Oops, I think we’re lost</h1>
          <p class="hero__subtitle">
            Let’s get you back to somewhere familiar...
          </p>
          <a href="/" class="btn btn--primary">
            <span class="btn__icon" aria-hidden="true">
              <!-- simple back chevron -->
              <svg
                width="25"
                height="25"
                viewBox="0 0 25 25"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M15.8 5.5L9 12.3L15.8 19.1"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span class="btn__label">Back To Home</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
